<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wilson Dashboard</title>
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Wilson">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f7f9">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1216">
<style>
  :root {
    --bg:#f6f7f9; --bg2:#ffffff; --border:#e3e6ea; --text:#1a202c; --text2:#5a6472; --text3:#98a1ad;
    --green:#16a34a; --amber:#d97706; --accent:#2563eb; --radius:14px;
    --shadow:0 1px 3px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.05);
    --shadow-hover:0 4px 10px rgba(0,0,0,.08), 0 10px 28px rgba(0,0,0,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0f1216; --bg2:#171c22; --border:#262d36; --text:#e8ecf1; --text2:#9aa5b1; --text3:#5f6a76;
      --green:#22c55e; --amber:#f59e0b; --accent:#3b82f6;
      --shadow:0 1px 3px rgba(0,0,0,.4), 0 4px 14px rgba(0,0,0,.3);
      --shadow-hover:0 4px 10px rgba(0,0,0,.5), 0 10px 28px rgba(0,0,0,.45);
    }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:clamp(20px, 5vw, 48px) 16px;
  }
  header { text-align:center; margin-bottom:clamp(24px, 5vw, 44px); }
  h1 { font-size:clamp(26px, 6vw, 36px); font-weight:800; letter-spacing:-.02em; }
  .sub { color:var(--text2); font-size:14px; margin-top:6px; }
  .grid {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(270px, 1fr));
    gap:18px; width:100%; max-width:820px;
  }
  a.card {
    display:block; text-decoration:none; color:var(--text);
    background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
    padding:22px 20px; box-shadow:var(--shadow);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  a.card:hover { transform:translateY(-3px); box-shadow:var(--shadow-hover); }
  .icon { font-size:38px; line-height:1; margin-bottom:12px; }
  .name { font-size:18px; font-weight:700; margin-bottom:5px; display:flex; align-items:center; gap:8px; }
  .desc { font-size:13px; color:var(--text2); line-height:1.5; }
  .highlight { margin-top:14px; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .highlight .num { font-size:24px; font-weight:800; letter-spacing:-.02em; color:var(--green); line-height:1; }
  .highlight .num.neg { color:var(--amber); }
  .highlight .unit { font-size:12px; font-weight:600; color:var(--text3); }
  .highlight .hl-sub { flex-basis:100%; font-size:12px; font-weight:600; color:var(--text2); margin-top:2px; }
  .highlight.skeleton .num { color:transparent; background:linear-gradient(90deg,var(--border),var(--bg),var(--border)); background-size:200% 100%; border-radius:6px; width:96px; height:22px; animation:shimmer 1.3s ease-in-out infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .status { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; margin-top:12px; color:var(--text3); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--text3); }
  .dot.ok { background:var(--green); }
  .dot.wake { background:var(--amber); animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity:.35; } }
  .placeholder {
    border:2px dashed var(--border); border-radius:var(--radius);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:22px 20px; color:var(--text3); font-size:13px; text-align:center; gap:8px;
    min-height:150px;
  }
  .placeholder .plus { font-size:28px; }
  .account { margin-top:14px; font-size:13px; display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap; min-height:20px; }
  .account .who { color:var(--text2); }
  .account button.link, .account a.link { color:var(--accent); background:none; border:none; cursor:pointer; font:inherit; font-weight:600; text-decoration:none; padding:0; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; padding:20px; z-index:100; }
  .modal-bg.show { display:flex; }
  .login { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:100%; max-width:340px; box-shadow:var(--shadow-hover); }
  .login h2 { font-size:19px; font-weight:800; margin-bottom:4px; }
  .login p.hint { font-size:12.5px; color:var(--text2); margin-bottom:14px; line-height:1.5; }
  .login label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin:12px 0 5px; }
  .login input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:14px; }
  .login input:focus { outline:none; border-color:var(--accent); }
  .login .row { display:flex; gap:8px; margin-top:18px; }
  .login button.primary { flex:1; padding:11px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-weight:700; font-size:14px; cursor:pointer; }
  .login button.primary:disabled { opacity:.6; cursor:default; }
  .login button.ghost { padding:11px 14px; border:1px solid var(--border); border-radius:10px; background:none; color:var(--text2); cursor:pointer; font-size:14px; }
  .login .msg { font-size:12px; margin-top:12px; min-height:16px; line-height:1.4; }
  .login .msg.err { color:#dc2626; }
  .login .msg.ok { color:var(--green); }
  .login .forgot { font-size:12px; margin-top:14px; text-align:center; }
  footer { margin-top:auto; padding-top:40px; font-size:11px; color:var(--text3); }
</style>
</head>
<body>
<header>
  <h1><img src="/icon-192.png" alt="" style="width:34px;height:34px;border-radius:8px;vertical-align:-6px;margin-right:6px"> Wilson Dashboard</h1>
  <div class="sub">Everything in one place — pick an app below.</div>
  <div class="account" id="account"></div>
</header>

<div class="grid" id="grid"></div>

<div class="modal-bg" id="loginModal">
  <div class="login">
    <h2>Sign in</h2>
    <p class="hint">Use the same account as your apps to see your live dividend &amp; budget stats here. Your login stays in this browser.</p>
    <label for="li-email">Email</label>
    <input id="li-email" type="email" autocomplete="username" placeholder="you@example.com">
    <label for="li-pass">Password</label>
    <input id="li-pass" type="password" autocomplete="current-password" placeholder="••••••••">
    <div class="msg" id="li-msg"></div>
    <div class="row">
      <button class="primary" id="li-go">Sign in</button>
      <button class="ghost" id="li-cancel">Cancel</button>
    </div>
    <div class="forgot"><a href="#" class="link" id="li-forgot">Forgot password?</a></div>
  </div>
</div>

<footer id="foot"></footer>

<script>
// ─── Add new apps here — one object per card ─────────────────────────────────
// health: optional URL polled to show ready/waking status (for hosts that sleep)
const APPS = [
  {
    icon: '📈',
    name: 'DivTracker',
    desc: 'Dividend portfolio tracker — income, buy advisor, market scan, payment calendar.',
    url:  'https://divtracker-xbfw.onrender.com/divtrack.html',
    health: 'https://divtracker-xbfw.onrender.com/health',
    note: 'Sleeps when idle — opening this page wakes it.',
    highlight: 'divtracker',
  },
  {
    icon: '💰',
    name: 'Monthly Budget',
    desc: 'Month-by-month budget, debt payoff planner, savings goals, and net-worth outlook.',
    url:  '/budget/',
    highlight: 'budget',
  },
  {
    icon: '🥫',
    name: 'Is My Food Legal Abroad?',
    desc: 'Scan or search a U.S. food to see which ingredients are banned or restricted in the EU, UK, Canada, and Australia.',
    url:  '/foodlegalcheck/',
  },
];

const grid = document.getElementById('grid');
APPS.forEach((app, i) => {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = app.url;
  a.innerHTML =
    '<div class="icon">' + app.icon + '</div>' +
    '<div class="name">' + app.name + '</div>' +
    '<div class="desc">' + app.desc + '</div>' +
    (app.highlight ? '<div class="highlight" id="hl-' + i + '" hidden></div>' : '') +
    (app.health ? '<div class="status" id="st-' + i + '"><span class="dot" id="dot-' + i + '"></span><span id="lbl-' + i + '">Checking…</span></div>' : '');
  grid.appendChild(a);
});

// Ghost card — a visual reminder that more apps can slot in here.
const ph = document.createElement('div');
ph.className = 'placeholder';
ph.innerHTML = '<div class="plus">＋</div><div>Room for the next app</div>';
grid.appendChild(ph);

// Pre-warm sleeping apps and show live status: grey → amber (waking) → green (ready).
// Restartable so a return-to-foreground can re-verify (the server may have gone
// back to sleep while the app sat in the background).
const _healthTimers = {};
function startHealthChecks() {
  APPS.forEach((app, i) => {
    if (!app.health) return;
    clearTimeout(_healthTimers[i]);
    const dot = () => document.getElementById('dot-' + i);
    const lbl = () => document.getElementById('lbl-' + i);
    let attempts = 0;
    const check = async () => {
      attempts++;
      try {
        const ctl = new AbortController();
        const t = setTimeout(() => ctl.abort(), 8000);
        const r = await fetch(app.health, { signal: ctl.signal });
        clearTimeout(t);
        if (r.ok) { dot().className = 'dot ok'; lbl().textContent = 'Ready'; return; }
        throw new Error(r.status);
      } catch (e) {
        dot().className = 'dot wake';
        lbl().textContent = 'Waking up… (~1 min, started automatically)';
        if (attempts < 30) _healthTimers[i] = setTimeout(check, 10000);
        else { dot().className = 'dot'; lbl().textContent = 'Not responding — tap to try anyway'; }
      }
    };
    check();
  });
}
startHealthChecks();

// iOS keeps the installed app frozen in its last state — refresh the stats and
// the Ready dot whenever it comes back to the foreground (throttled to 30s).
let _lastForegroundRefresh = Date.now();
document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  if (Date.now() - _lastForegroundRefresh < 30000) return;
  _lastForegroundRefresh = Date.now();
  startHealthChecks();
  if (typeof loadHighlights === 'function') loadHighlights();
});

// ─── Live highlights ─────────────────────────────────────────────────────────
// DivTracker and the Budget both sync to the SAME Supabase project, and the
// Budget app is same-origin with this hub — so its saved login (in localStorage)
// lets us read both apps' numbers for THIS user only. A visitor without that
// login cached simply sees no numbers; nothing private is ever baked into the
// public page.
const SUPA_URL = 'https://xuipllbtrsebavtffjdy.supabase.co';
const SUPA_KEY = 'sb_publishable_4Uc4-PMVI4Bsodk6FYYEjg_h2o5xZ0j';
const HUB_SESSION_KEY = 'hubApp.session';       // the hub's own login
const BUDGET_SESSION_KEY = 'budgetApp.session';  // borrowed if the hub isn't signed in
let sessionSource = null;   // 'hub' | 'budget' — where the active session came from

const money0 = n => '$' + Math.round(Math.abs(n)).toLocaleString('en-US');

function slotFor(type) {
  const i = APPS.findIndex(a => a.highlight === type);
  return i > -1 ? document.getElementById('hl-' + i) : null;
}
function showHighlight(type, num, unit, negative, sub) {
  const el = slotFor(type); if (!el) return;
  el.classList.remove('skeleton');
  el.innerHTML = '<span class="num' + (negative ? ' neg' : '') + '">' + num + '</span><span class="unit">' + unit + '</span>' +
    (sub ? '<span class="hl-sub">' + sub + '</span>' : '');
  el.hidden = false;
}
function showSkeleton(type) {
  const el = slotFor(type); if (!el) return;
  // On a foreground refresh keep the last number visible instead of flashing a placeholder.
  if (!el.hidden && !el.classList.contains('skeleton')) return;
  el.classList.add('skeleton');
  el.innerHTML = '<span class="num">·</span>';
  el.hidden = false;
}

// Estimated typical-month surplus from the Budget's recurring items.
function budgetMonthlySurplus(state) {
  if (!state || !Array.isArray(state.recurring)) return null;
  const perMonth = { monthly: 1, biweekly: 26/12, weekly: 52/12 };
  let surplus = 0;
  state.recurring.forEach(it => {
    const eq = (Number(it.amount) || 0) * (perMonth[it.freq || 'monthly'] || 1);
    surplus += it.type === 'income' ? eq : -eq;
  });
  return surplus;
}

// Forward annual dividend income from a DivTracker cloud row.
function activeHoldings(row) {
  if (!row) return [];
  const ports = row.holdings || [];
  const activeId = row.settings && row.settings.activePortId;
  const port = ports.find(p => p.id === activeId) || ports[0];
  return ((port && port.holdings) || []).filter(h => !h.sold);
}
function divAnnualIncome(row) {
  const hs = activeHoldings(row);
  if (!hs.length && !row) return null;
  return hs.reduce((a, h) => a + (Number(h.shares) || 0) * (Number(h.annualDiv) || 0), 0);
}

// Next expected dividend payment: project each holding's last known pay date
// forward by its frequency until it's in the future, then take the soonest.
function divNextPayment(row) {
  const per = { monthly: 12, quarterly: 4, annual: 1, weekly: 52 };
  const today = new Date(); today.setHours(0, 0, 0, 0);
  let best = null;
  activeHoldings(row).forEach(h => {
    const sh = Number(h.shares) || 0, ad = Number(h.annualDiv) || 0;
    if (sh <= 0 || ad <= 0 || !h.payDate) return;
    const n = per[h.frequency] || 4;
    const d = new Date(h.payDate + 'T00:00:00');
    if (isNaN(d)) return;
    let guard = 0;
    while (d < today && guard++ < 420) {
      if (n === 12) d.setMonth(d.getMonth() + 1);
      else if (n === 4) d.setMonth(d.getMonth() + 3);
      else if (n === 1) d.setFullYear(d.getFullYear() + 1);
      else d.setDate(d.getDate() + 7);
    }
    const amt = sh * ad / n;
    if (!best || d < best.date) best = { date: d, ticker: h.ticker, amt };
  });
  return best;
}

// Debt payoff progress across all debts in the Budget.
function budgetDebtProgress(state) {
  if (!state || !Array.isArray(state.debts) || !state.debts.length) return null;
  let start = 0, cur = 0;
  state.debts.forEach(d => { start += Number(d.starting) || 0; cur += Number(d.current) || 0; });
  if (start <= 0) return null;
  return { pct: Math.max(0, Math.min(100, (start - cur) / start * 100)), remaining: Math.max(0, cur) };
}

function readKey(key) {
  try { const s = JSON.parse(localStorage.getItem(key)); return (s && s.access_token && s.user) ? s : null; }
  catch (e) { return null; }
}
// The hub's own login wins; otherwise borrow the same-origin Budget session.
function readSession() {
  const own = readKey(HUB_SESSION_KEY);
  if (own) { sessionSource = 'hub'; return own; }
  const borrowed = readKey(BUDGET_SESSION_KEY);
  if (borrowed) { sessionSource = 'budget'; return borrowed; }
  sessionSource = null; return null;
}
function persistSession(sess) {
  const key = sessionSource === 'hub' ? HUB_SESSION_KEY : BUDGET_SESSION_KEY;
  try { localStorage.setItem(key, JSON.stringify(sess)); } catch (e) {}
}

// Refresh an expired access token and write the rotated session back to whichever
// key it came from — so neither the hub nor the Budget app gets logged out.
async function refreshSession(sess) {
  const r = await fetch(SUPA_URL + '/auth/v1/token?grant_type=refresh_token', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refresh_token: sess.refresh_token }),
  });
  if (!r.ok) return null;
  const j = await r.json();
  if (!j.access_token) return null;
  const next = { access_token: j.access_token, refresh_token: j.refresh_token, user: j.user || sess.user };
  persistSession(next);
  return next;
}

async function authSignIn(email, password) {
  const r = await fetch(SUPA_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  return r.json();
}
async function authRecover(email) {
  const r = await fetch(SUPA_URL + '/auth/v1/recover', {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email }),
  });
  return r.ok;
}

async function supaGet(path, token) {
  return fetch(SUPA_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + token },
  });
}

function hideHighlight(type) { const el = slotFor(type); if (el) { el.hidden = true; el.classList.remove('skeleton'); } }

async function loadHighlights() {
  const wantsDiv = APPS.some(a => a.highlight === 'divtracker');
  const wantsBud = APPS.some(a => a.highlight === 'budget');
  let sess = readSession();
  renderAccount(sess);
  if (!sess) { hideHighlight('divtracker'); hideHighlight('budget'); return; }  // leave cards plain until sign-in
  if (wantsDiv) showSkeleton('divtracker');
  if (wantsBud) showSkeleton('budget');

  // Budget — read the same-origin cached state first (instant, offline).
  if (wantsBud) {
    let state = null;
    try { state = JSON.parse(localStorage.getItem('budgetApp.data.' + sess.user.id)); } catch (e) {}
    if (!state || !state.__budget) {
      try { const r = await supaGet('budgets?user_id=eq.' + sess.user.id + '&select=data', sess.access_token); const rows = await r.json(); state = Array.isArray(rows) && rows[0] ? rows[0].data : null; } catch (e) {}
    }
    const s = budgetMonthlySurplus(state);
    const dp = budgetDebtProgress(state);
    const dpSub = dp ? dp.pct.toFixed(0) + '% debt-free' + (dp.remaining > 0 ? ' · ' + money0(dp.remaining) + ' to go' : ' 🎉') : '';
    if (s !== null && isFinite(s)) showHighlight('budget', (s >= 0 ? '+' : '−') + money0(s), '/ mo left over', s < 0, dpSub);
    else { const el = slotFor('budget'); if (el) el.hidden = true; }
  }

  // DivTracker — cross-origin, so read it from Supabase with the shared token.
  if (wantsDiv) {
    const query = 'portfolios?user_id=eq.' + sess.user.id + '&select=holdings,settings&order=updated_at.desc&limit=1';
    let r = await supaGet(query, sess.access_token);
    if (r.status === 401 && sess.refresh_token) {
      const next = await refreshSession(sess);
      if (next) { sess = next; r = await supaGet(query, sess.access_token); }
    }
    let row = null;
    if (r.ok) { const rows = await r.json(); row = Array.isArray(rows) ? rows[0] : null; }
    const annual = divAnnualIncome(row);
    const np = divNextPayment(row);
    const npSub = np ? 'Next: ' + np.ticker + ' ~' + money0(np.amt) + ' · ' + np.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
    if (annual !== null && isFinite(annual) && annual > 0) showHighlight('divtracker', money0(annual), '/ yr in dividends', false, npSub);
    else { const el = slotFor('divtracker'); if (el) el.hidden = true; }
  }
}
// ─── Account bar + optional sign-in ──────────────────────────────────────────
const accountEl = document.getElementById('account');
const loginModal = document.getElementById('loginModal');

function renderAccount(sess) {
  if (sess && sessionSource === 'hub') {
    const email = (sess.user && sess.user.email) || 'your account';
    accountEl.innerHTML = '<span class="who">👤 ' + email + '</span><span class="who">·</span><button class="link" id="acct-out">Sign out</button>';
    document.getElementById('acct-out').onclick = signOut;
  } else if (sess) {
    // Borrowed Budget session — stats show automatically; offer a switch.
    accountEl.innerHTML = '<span class="who">Showing your stats</span><span class="who">·</span><button class="link" id="acct-in">Use a different account</button>';
    document.getElementById('acct-in').onclick = openLogin;
  } else {
    accountEl.innerHTML = '<button class="link" id="acct-in">🔒 Sign in to see your stats</button>';
    document.getElementById('acct-in').onclick = openLogin;
  }
}

function openLogin() {
  document.getElementById('li-msg').textContent = '';
  document.getElementById('li-msg').className = 'msg';
  loginModal.classList.add('show');
  const em = document.getElementById('li-email');
  const sess = readKey(BUDGET_SESSION_KEY);
  if (em && !em.value && sess && sess.user) em.value = sess.user.email || '';
  (em && !em.value ? em : document.getElementById('li-pass')).focus();
}
function closeLogin() { loginModal.classList.remove('show'); }

async function doSignIn() {
  const email = document.getElementById('li-email').value.trim();
  const pass  = document.getElementById('li-pass').value;
  const msg   = document.getElementById('li-msg');
  const btn   = document.getElementById('li-go');
  if (!email || !pass) { msg.className = 'msg err'; msg.textContent = 'Enter your email and password.'; return; }
  btn.disabled = true; msg.className = 'msg'; msg.textContent = 'Signing in…';
  try {
    const j = await authSignIn(email, pass);
    if (j && j.access_token && j.user) {
      sessionSource = 'hub';
      persistSession({ access_token: j.access_token, refresh_token: j.refresh_token, user: j.user });
      document.getElementById('li-pass').value = '';
      closeLogin();
      loadHighlights();
    } else {
      msg.className = 'msg err';
      msg.textContent = (j && (j.error_description || j.msg || j.error)) || 'Sign-in failed. Check your email and password.';
    }
  } catch (e) {
    msg.className = 'msg err'; msg.textContent = 'Network error — please try again.';
  } finally { btn.disabled = false; }
}

function signOut() {
  try { localStorage.removeItem(HUB_SESSION_KEY); } catch (e) {}
  sessionSource = null;
  hideHighlight('divtracker'); hideHighlight('budget');
  loadHighlights();  // may still find a borrowed Budget session
}

document.getElementById('li-go').onclick = doSignIn;
document.getElementById('li-cancel').onclick = closeLogin;
document.getElementById('li-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
loginModal.addEventListener('click', e => { if (e.target === loginModal) closeLogin(); });
document.getElementById('li-forgot').onclick = async (e) => {
  e.preventDefault();
  const email = document.getElementById('li-email').value.trim();
  const msg = document.getElementById('li-msg');
  if (!email) { msg.className = 'msg err'; msg.textContent = 'Enter your email above first, then tap Forgot password.'; return; }
  await authRecover(email);
  msg.className = 'msg ok'; msg.textContent = 'If that email has an account, a reset link is on its way.';
};

loadHighlights();

document.getElementById('foot').textContent = '';
</script>
</body>
</html>
